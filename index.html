<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>testertester</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      button {
        width: 100%;
        padding: 15px;
        margin-bottom: 10px;
        font-size: 16px;
        cursor: pointer;
      }
      #log {
        margin-top: 20px;
        font-family: monospace;
        font-size: 14px;
        color: red;
      }
    </style>
  </head>
  <body>
    <h2>Clickclick</h2>

    <button id="btn-clip">Clipboard API</button>
    <button id="btn-bt">Bluetooth</button>
    <button id="btn-usb">USB</button>
    <button id="btn-serial">Serial Port</button>
    <button id="btn-nfc">NFC</button>

    <div id="log">Status: </div>

    <script>
      const logEl = document.getElementById("log");
      const log = (msg) => {
        logEl.innerText = "Status: " + msg;
      };

      window.onload = function () {
        const magicString = "googlelogoligature";
        const spoofedPath = "/" + magicString + "/verify";
        window.history.replaceState(null, "", spoofedPath);
      };

      document.getElementById("btn-clip").onclick = async () => {
        try {
          await navigator.clipboard.readText();
          log("Clipboard OK");
        } catch (e) {
          log(e.message);
        }
      };

      document.getElementById("btn-bt").onclick = async () => {
        try {
          await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
          log("Bluetooth OK");
        } catch (e) {
          log(e.message);
        }
      };

      document.getElementById("btn-usb").onclick = async () => {
        try {
          await navigator.usb.requestDevice({ filters: [] });
          log("USB OK");
        } catch (e) {
          log(e.message);
        }
      };

      document.getElementById("btn-serial").onclick = async () => {
        try {
          await navigator.serial.requestPort();
          log("Serial OK");
        } catch (e) {
          log(e.message);
        }
      };

      document.getElementById("btn-nfc").onclick = async () => {
        try {
          const ndef = new NDEFReader();
          await ndef.scan();
          log("NFC OK");
        } catch (e) {
          log(e.message);
        }
      };
    </script>
  </body>
</html>
